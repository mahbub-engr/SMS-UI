<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="dir/css/bootstrap.min.css">
    <link rel="stylesheet" href="./dir/css/style.css">
</head>

<body>
    <section class="login d-flex flex-column justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-6">
                    <div class="login-body d-flex flex-column">
                        <div class="tite mb-5">
                            <h2>Welcome, Log into you account</h2>
                        </div>
                        <div class="login-form bg-white">
                            <div class="row justify-content-center">
                                <div class="col-6">
                                    <div class="d-flex flex-column gap-3 text-center">
                                        <p>It is our great pleasure to have you on board!</p>
                                        <input type="text" placeholder="Enter the name of school">
                                        <div class="password-box">
                                            <input class="w-100" type="password" id="password" placeholder="Enter Password">
                                            <span  id="toggleEye">👁️</span>
                                        </div>
                                        <button id="login">Login</button>
                                        <p class="sighnup-text">Don't have an account? <a href="#" id="sign_up">Sign up</a></p>
                                        <a href="#">Reset Pasaword</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </section>



    <script src="dir/js/jquery-4.0.0.min.js"></script>
    <script src="dir/js/bootstrap.min.js"></script>
    <script src="dir/js/script.js"></script>
</body>

</html>
